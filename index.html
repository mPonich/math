<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер Множення ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f9ff;
            touch-action: manipulation;
        }
        .card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-md bg-white rounded-3xl card p-6 text-center">
        
        <!-- Екран ПРИВІТАННЯ -->
        <div id="start-screen" class="space-y-6">
            <h1 class="text-3xl font-black text-blue-600">Привіт! ✨</h1>
            <p class="text-gray-600 text-lg">Скільки прикладів розв'яжемо?</p>
            
            <div class="flex flex-col items-center gap-4">
                <div class="w-full">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-tighter">Кількість прикладів</label>
                    <input type="number" id="question-count" value="5" min="1" max="50" 
                        class="w-full text-center text-3xl font-bold p-3 border-4 border-blue-200 rounded-2xl focus:border-blue-500 outline-none transition-all">
                </div>
                
                <button onclick="window.initGame()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow-lg transform active:scale-95 transition-all">
                    Почати гру! 🚀
                </button>

                <button onclick="window.toggleHistory()" id="history-btn" class="text-blue-400 font-bold text-sm hover:underline">
                    Подивитися історію занять 📜
                </button>
            </div>
        </div>

        <!-- Екран ГРИ -->
        <div id="game-screen" class="hidden space-y-8">
            <div class="flex justify-between items-center text-sm font-bold text-gray-400 uppercase">
                <span>Приклад <span id="current-number">1</span> з <span id="total-count-display">0</span></span>
            </div>

            <div class="py-10">
                <div class="text-6xl font-black text-gray-800 mb-8 select-none">
                    <span id="val-a">0</span> × <span id="val-b">0</span> = ?
                </div>
                
                <input type="number" id="answer-input" placeholder="..." 
                    inputmode="numeric"
                    class="w-full text-center text-5xl font-black p-4 bg-gray-50 border-b-8 border-blue-400 rounded-2xl focus:bg-white outline-none transition-all"
                    autofocus>
            </div>

            <button onclick="window.submitAnswer()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow-lg transform active:scale-95 transition-all">
                Далі ➔
            </button>
        </div>

        <!-- Екран РЕЗУЛЬТАТІВ -->
        <div id="result-screen" class="hidden space-y-6">
            <h2 class="text-3xl font-black text-gray-800">Твій результат! 🏆</h2>
            
            <div class="flex justify-around py-4 bg-gray-50 rounded-2xl">
                <div>
                    <div class="text-3xl font-black text-green-500" id="correct-count">0</div>
                    <div class="text-xs uppercase font-bold text-gray-400">Вірно</div>
                </div>
                <div class="h-10 w-px bg-gray-200"></div>
                <div>
                    <div class="text-3xl font-black text-red-500" id="wrong-count">0</div>
                    <div class="text-xs uppercase font-bold text-gray-400">Помилки</div>
                </div>
            </div>

            <div id="results-list" class="space-y-2 max-h-64 overflow-y-auto pr-2 text-left custom-scrollbar">
                <!-- Сюди додаються результати сесії -->
            </div>

            <div class="flex flex-col gap-3">
                <button id="retry-errors-btn" onclick="window.retryErrors()" class="hidden w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-4 px-4 rounded-2xl shadow-md transition-all">
                    Виправити помилки 🔄
                </button>
                <button onclick="window.resetToHome()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-4 px-4 rounded-2xl transition-all">
                    На головний екран 🏠
                </button>
            </div>
        </div>

        <!-- Екран ІСТОРІЇ -->
        <div id="history-screen" class="hidden space-y-6">
            <h2 class="text-2xl font-black text-gray-800">Історія занять 📅</h2>
            <div id="history-container" class="space-y-3 max-h-96 overflow-y-auto pr-2 text-left custom-scrollbar">
                <p class="text-gray-400 text-center py-10">Завантаження...</p>
            </div>
            <button onclick="window.showScreen('start-screen')" class="w-full bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl">
                Назад
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Ваші дані Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDZD-X9l_-8Pu9ir5mP6q9jaezKHo19E1U",
            authDomain: "math-trainer-a89d8.firebaseapp.com",
            projectId: "math-trainer-a89d8",
            storageBucket: "math-trainer-a89d8.firebasestorage.app",
            messagingSenderId: "576769138792",
            appId: "1:576769138792:web:a88c8f9e0f1d6aa8e21bdd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "math-trainer-v1"; // ID для шляху в базі

        let user = null;
        let questions = [];
        let currentIndex = 0;

        // Авторизація
        signInAnonymously(auth).catch(err => console.error("Помилка входу:", err));
        onAuthStateChanged(auth, (u) => { user = u; });

        // Навігація
        window.showScreen = (id) => {
            ['start-screen', 'game-screen', 'result-screen', 'history-screen'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        };

        window.resetToHome = () => {
            questions = [];
            currentIndex = 0;
            window.showScreen('start-screen');
        };

        // Логіка гри
        window.initGame = () => {
            const count = parseInt(document.getElementById('question-count').value) || 5;
            questions = [];
            for (let i = 0; i < count; i++) {
                questions.push({
                    a: Math.floor(Math.random() * 8) + 2,
                    b: Math.floor(Math.random() * 8) + 2,
                    userAnswer: null,
                    isCorrect: false
                });
            }
            currentIndex = 0;
            updateGameUI();
            window.showScreen('game-screen');
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        };

        function updateGameUI() {
            const q = questions[currentIndex];
            document.getElementById('val-a').innerText = q.a;
            document.getElementById('val-b').innerText = q.b;
            document.getElementById('current-number').innerText = currentIndex + 1;
            document.getElementById('total-count-display').innerText = questions.length;
            document.getElementById('answer-input').value = '';
        }

        window.submitAnswer = () => {
            const input = document.getElementById('answer-input');
            const val = parseInt(input.value);
            if (isNaN(val)) return;

            const q = questions[currentIndex];
            q.userAnswer = val;
            q.isCorrect = (val === q.a * q.b);

            if (currentIndex < questions.length - 1) {
                currentIndex++;
                updateGameUI();
                input.focus();
            } else {
                finishSession();
            }
        };

        async function finishSession() {
            let correct = 0;
            let wrong = 0;
            questions.forEach(q => q.isCorrect ? correct++ : wrong++);

            // Показуємо результат
            renderResults(correct, wrong);
            window.showScreen('result-screen');

            // Зберігаємо в базу (Firestore)
            if (user) {
                try {
                    const sessionPath = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                    await addDoc(sessionPath, {
                        timestamp: Date.now(),
                        date: new Date().toLocaleDateString('uk-UA'),
                        time: new Date().toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' }),
                        total: questions.length,
                        correct: correct,
                        wrong: wrong,
                        details: questions.map(q => ({
                            eq: `${q.a}×${q.b}`,
                            ans: q.userAnswer,
                            ok: q.isCorrect,
                            res: q.a * q.b
                        }))
                    });
                } catch (e) {
                    console.error("Не вдалося зберегти в хмару:", e);
                }
            }
        }

        function renderResults(c, w) {
            const list = document.getElementById('results-list');
            list.innerHTML = '';
            questions.forEach(q => {
                const div = document.createElement('div');
                div.className = `flex justify-between p-3 rounded-xl mb-2 ${q.isCorrect ? 'bg-green-50' : 'bg-red-50'}`;
                div.innerHTML = `
                    <div class="font-bold">
                        ${q.a} × ${q.b} = ${q.userAnswer}
                        ${!q.isCorrect ? `<span class="text-xs block text-gray-400 font-normal">Правильно: ${q.a * q.b}</span>` : ''}
                    </div>
                    <div>${q.isCorrect ? '✅' : '❌'}</div>
                `;
                list.appendChild(div);
            });
            document.getElementById('correct-count').innerText = c;
            document.getElementById('wrong-count').innerText = w;
            document.getElementById('retry-errors-btn').classList.toggle('hidden', w === 0);
        }

        window.retryErrors = () => {
            questions = questions.filter(q => !q.isCorrect).map(q => ({
                a: q.a, b: q.b, userAnswer: null, isCorrect: false
            }));
            currentIndex = 0;
            updateGameUI();
            window.showScreen('game-screen');
        };

        // Завантаження історії
        window.toggleHistory = () => {
            window.showScreen('history-screen');
            if (!user) return;
            
            const container = document.getElementById('history-container');
            const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
            
            onSnapshot(historyRef, (snap) => {
                container.innerHTML = '';
                let docs = [];
                snap.forEach(d => docs.push(d.data()));
                docs.sort((a, b) => b.timestamp - a.timestamp);

                if (docs.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-center py-10">Тут поки порожньо</p>';
                    return;
                }

                docs.forEach(data => {
                    const el = document.createElement('div');
                    el.className = "bg-gray-50 p-4 rounded-2xl border border-gray-100";
                    el.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="font-black text-gray-800">${data.date}</div>
                                <div class="text-[10px] text-gray-400 font-bold">${data.time}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-sm font-bold text-green-600">✅ ${data.correct}</div>
                                <div class="text-sm font-bold text-red-500">❌ ${data.wrong}</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(el);
                });
            });
        };

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.submitAnswer();
        });
    </script>
</body>
</html>
